name: Generate Sponsors JSON

on:
  push:
    paths:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Generate sponsors.json
        run: |
          echo "[" > sponsors.json
          first=true

          for folder in */
          do
            # skip system folders
            if [[ "$folder" == ".github/" ]]; then
              continue
            fi

            name=$(basename "$folder")

            # get all matching images into array
            images=($(ls "$folder"/*.{jpg,jpeg,png,webp,gif} 2>/dev/null))

            image_count=${#images[@]}

            # default empty image
            image=""

            if [ "$image_count" -eq 1 ]; then
              image="${images[0]}"
            elif [ "$image_count" -gt 1 ]; then
              echo "⚠️ Warning: Multiple images found in $folder. Skipping images."
            else
              echo "ℹ️ No image found in $folder."
            fi

            if [ "$first" = true ]; then
              first=false
            else
              echo "," >> sponsors.json
            fi

            echo "  {" >> sponsors.json
            echo "    \"folder\": \"$name\"," >> sponsors.json
            echo "    \"image\": \"$image\"" >> sponsors.json
            echo "  }" >> sponsors.json

          done

          echo "]" >> sponsors.json

      - name: Commit sponsors.json
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add sponsors.json
          git commit -m "Auto update sponsors.json" || echo "No changes"
          git push
