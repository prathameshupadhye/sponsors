- name: Generate sponsors.json
  run: |
    shopt -s nullglob

    echo "[" > sponsors.json
    first=true

    for folder in */
    do
      # skip system folders
      if [[ "$folder" == ".github/" ]]; then
        continue
      fi

      name=$(basename "$folder")

      # collect images safely
      images=("$folder"/*.jpg "$folder"/*.jpeg "$folder"/*.png "$folder"/*.webp "$folder"/*.gif)

      image_count=${#images[@]}

      # default empty image
      image=""

      if [ "$image_count" -eq 1 ]; then
        image="${images[0]}"
      elif [ "$image_count" -gt 1 ]; then
        echo "⚠️ Warning: Multiple images found in $folder. Skipping images."
      else
        echo "ℹ️ No image found in $folder."
      fi

      if [ "$first" = true ]; then
        first=false
      else
        echo "," >> sponsors.json
      fi

      echo "  {" >> sponsors.json
      echo "    \"folder\": \"$name\"," >> sponsors.json
      echo "    \"image\": \"$image\"" >> sponsors.json
      echo "  }" >> sponsors.json

    done

    echo "]" >> sponsors.json
